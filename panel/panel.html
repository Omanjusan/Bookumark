<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Bookumark</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="frame">
    <header>
      <h1>Bookumark</h1>
      <span id="count"></span>
    </header>
    <input
      id="search"
      type="search"
      aria-label="ブックマークを検索"
      placeholder="ブックマークを検索"
      autocomplete="off"
    >
    <nav id="folders" class="folder-region" aria-label="フォルダ" hidden></nav>
    <div
      id="official-move-notice"
      class="official-move-notice"
      role="status"
      aria-live="polite"
      hidden
    >
      <span id="official-move-message"></span>
      <button id="official-move-undo" type="button">元に戻す</button>
    </div>
    <main id="app">
      <p class="status">読み込み中…</p>
    </main>
    <footer class="panel-tools">
      <label>
        並び順
        <select id="sort-axis" aria-label="並び順">
          <option value="title">タイトル</option>
          <option value="dateAdded">追加日時</option>
          <option value="visitCount" selected>訪問回数</option>
          <option value="lastVisitTime">最終訪問日時</option>
        </select>
      </label>
      <button
        id="sort-direction"
        type="button"
        data-direction="desc"
        aria-label="並び方向を切り替え"
      >降順</button>
      <fieldset
        id="movement-mode"
        class="movement-mode"
        aria-describedby="movement-mode-note"
      >
        <legend>移動モード</legend>
        <div class="movement-mode-options">
          <label class="movement-option movement-option--custom">
            <input type="radio" name="movement-mode" value="custom-order">
            <span class="movement-segment">カスタム配置</span>
          </label>
          <label class="movement-option movement-option--normal">
            <input type="radio" name="movement-mode" value="normal" checked>
            <span class="movement-segment">通常</span>
          </label>
          <label class="movement-option movement-option--directory">
            <input type="radio" name="movement-mode" value="directory-move">
            <span class="movement-segment">公式整理</span>
          </label>
        </div>
        <span id="movement-mode-note" class="movement-mode-note">公式整理はFirefox本体へ反映</span>
      </fieldset>
    </footer>
  </div>
  <script type="module" src="panel.js"></script>
</body>
</html>
