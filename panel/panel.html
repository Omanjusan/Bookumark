<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Bookumark</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="frame">
    <header>
      <h1>Bookumark</h1>
      <span id="count"></span>
    </header>
    <input
      id="search"
      type="search"
      aria-label="ブックマークを検索"
      placeholder="ブックマークを検索"
      autocomplete="off"
    >
    <main id="app">
      <p class="status">読み込み中…</p>
    </main>
    <footer class="panel-tools">
      <label>
        並び順
        <select id="sort-axis" aria-label="並び順" disabled>
          <option value="title">タイトル</option>
          <option value="dateAdded">追加日時</option>
          <option value="visitCount" selected>訪問回数</option>
          <option value="lastVisitTime">最終訪問日時</option>
        </select>
      </label>
      <button
        id="sort-direction"
        type="button"
        data-direction="desc"
        aria-label="並び方向を切り替え"
        disabled
      >降順</button>
      <label><input id="free-movement" type="checkbox" checked> 自由移動</label>
    </footer>
  </div>
  <script type="module" src="panel.js"></script>
</body>
</html>
