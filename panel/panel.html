<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Bookumark</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="frame">
    <header>
      <h1>Bookumark</h1>
      <span id="count"></span>
    </header>
    <input
      id="search"
      type="search"
      aria-label="ブックマークを検索"
      placeholder="ブックマークを検索"
      autocomplete="off"
    >
    <main id="app">
      <p class="status">読み込み中…</p>
    </main>
    <footer class="panel-tools">
      <label><input id="free-movement" type="checkbox" checked> 自由移動</label>
    </footer>
  </div>
  <script type="module" src="panel.js"></script>
</body>
</html>
